# Pipeline crawl hằng đêm: 6 nguồn API -> DeepSeek chấm điểm -> Supabase
# Cần GitHub Secrets: SUPABASE_URL, SUPABASE_KEY (service_role), DEEPSEEK_API_KEY,
#   SCOPUS_API_KEY, SEMANTIC_SCHOLAR_API_KEY, SPRINGER_API_KEY, CORE_API_KEY, CROSSREF_MAILTO
name: Daily Crawl -> DeepSeek -> Supabase

on:
  schedule:
    # 22:00 UTC = 05:00 sáng giờ VN (UTC+7)
    - cron: "0 22 * * *"
  workflow_dispatch: {}   # cho phép bấm "Run workflow" để chạy tay

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Crawl 6 nguồn API (query 12-term Block AxBxC)
        env:
          SCOPUS_API_KEY: ${{ secrets.SCOPUS_API_KEY }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
          SPRINGER_API_KEY: ${{ secrets.SPRINGER_API_KEY }}
          CORE_API_KEY: ${{ secrets.CORE_API_KEY }}
          CROSSREF_MAILTO: ${{ secrets.CROSSREF_MAILTO }}
        run: python -m pipeline.crawl --out data/crawl_latest.json

      - name: DeepSeek chấm điểm IC/EC + Gap + tóm tắt VI
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: https://api.deepseek.com
          DEEPSEEK_MODEL: deepseek-chat
        run: python -m pipeline.score --in data/crawl_latest.json --out data/scored_latest.json

      - name: Đẩy kết quả vào Supabase (upsert theo url)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python -m pipeline.push_to_supabase --in data/scored_latest.json

# LƯU Ý:
# - Repo public: Actions không giới hạn phút. GitHub tạm dừng scheduled workflow nếu
#   repo không hoạt động > 60 ngày -> vào bấm Run tay để đánh thức.
# - Mỗi đêm chỉ upsert; paper đã có (theo url/doi) sẽ được cập nhật, không nhân bản.
# - Chi phí DeepSeek tỉ lệ số paper crawl được mỗi đêm (thường nhỏ sau lần đầu).
